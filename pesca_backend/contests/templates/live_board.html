<!DOCTYPE html>
<html>
<head>
    <title>Live</title>
</head>
<body>

<h1>{{ contest.name }}</h1>

<h2>Capturas</h2>

{% if captures %}
    {% for c in captures %}
        <p>{{ c.fisher.full_name }} - {{ c.length_cm }} cm</p>
    {% endfor %}
{% else %}
    <p>No hay capturas</p>
{% endif %}

<h2>Sponsors</h2>

{% if sponsors %}
    {% for s in sponsors %}
        <p>{{ s.name }}</p>
    {% endfor %}
{% else %}
    <p>No hay sponsors</p>
{% endif %}

</body>
</html>
