<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>{{ contest.name }}</title>

<style>

body{
margin:0;
font-family:Arial;
background:#081028;
color:white;
overflow:hidden;
}

/* GRID PRINCIPAL */

.layout{

display:grid;

grid-template-columns:3fr 1fr;

grid-template-rows:1fr 100px;

height:100vh;

}

/* CAPTURA */

.capture{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

.capture img{

width:90%;
max-height:70vh;

border-radius:15px;

object-fit:contain;

background:black;

}

.capture-name{

font-size:48px;
font-weight:bold;
margin-top:20px;

}

.capture-size{

font-size:70px;
color:#40e0d0;

}

/* RANKING */

.ranking{

background:#0f1b40;

padding:30px;

}

.rank-title{

font-size:36px;

margin-bottom:20px;

}

.rank-item{

display:flex;

justify-content:space-between;

font-size:26px;

margin-bottom:15px;

}

/* SPONSORS */

.sponsors{

grid-column:1/3;

background:black;

display:flex;

align-items:center;

overflow:hidden;

}

.sponsor-track{

display:flex;

animation:scroll 35s linear infinite;

}

.sponsor{

height:70px;

margin:0 50px;

}

@keyframes scroll{

from{transform:translateX(0)}

to{transform:translateX(-50%)}

}

</style>

</head>

<body>

<div class="layout">

<div class="capture">

{% if capture.photo %}

<img src="{{ capture.photo.url }}">

{% endif %}

<div class="capture-name">

{{ capture.fisher.get_full_name }}

</div>

<div class="capture-size">

{{ capture.length_cm }} cm

</div>

</div>

<div class="ranking">

<div class="rank-title">

🏆 Ranking

</div>

{% for r in ranking %}

<div class="rank-item">

<span>{{ forloop.counter }} {{ r.get_full_name }}</span>

<span>{{ r.total_points }} cm</span>

</div>

{% endfor %}

</div>

<div class="sponsors">

<div class="sponsor-track">

{% for s in sponsors %}

<img class="sponsor" src="{{ s.logo.url }}">

{% endfor %}

{% for s in sponsors %}

<img class="sponsor" src="{{ s.logo.url }}">

{% endfor %}

</div>

</div>

</div>

</body>

</html>
