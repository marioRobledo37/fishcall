<!DOCTYPE html>
<html>

<head>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0b132b">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
padding:20px;
background:#0b132b;
color:white;
}

input{
width:100%;
padding:18px;
margin-bottom:15px;
font-size:22px;
}

button{
width:100%;
padding:20px;
font-size:24px;
background:#5bc0be;
border:none;
color:white;
margin-top:10px;
}

.species-buttons{
display:flex;
flex-wrap:wrap;
}

.species-buttons button{
width:48%;
margin:1%;
background:#1c2541;
}

#reader{
margin-top:20px;
}

#fisher_card{
margin-top:20px;
text-align:center;
}

#fisher_photo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #5bc0be;
}

</style>

</head>

<body>

<h2>🎣 Registrar captura</h2>

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<!-- NUMERO PESCADOR -->

<input
id="competitor_number"
name="number"
placeholder="Número pescador"
>

<button type="button" onclick="iniciarScanner()">
📷 Escanear QR
</button>

<div id="reader"></div>

<!-- TARJETA PESCADOR -->

<div id="fisher_card" style="display:none">

<img id="fisher_photo">

<h3 id="fisher_name"></h3>

<p id="fisher_club"></p>

</div>

<!-- MEDIDA -->

<input
id="length_cm"
name="length_cm"
placeholder="Medida cm"
type="number"
>

<!-- ESPECIE -->

<input
id="species"
name="species"
placeholder="Especie"
>

<div class="species-buttons">

<button type="button" onclick="setSpecies('Surubí')">
🐟 Surubí
</button>

<button type="button" onclick="setSpecies('Boga')">
🐟 Boga
</button>

<button type="button" onclick="setSpecies('Dorado')">
🐟 Dorado
</button>

<button type="button" onclick="setSpecies('Bagre')">
🐟 Bagre
</button>

</div>

<!-- FOTO -->

<input
name="photo"
type="file"
accept="image/*"
capture="environment"
>

<button type="submit">
Guardar captura
</button>

</form>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const contestId = "{{ contest.id }}";

function setSpecies(species){
document.getElementById("species").value = species;
}

function iniciarScanner(){

let scanner = new Html5QrcodeScanner(
"reader",
{ fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);

}

function onScanSuccess(decodedText){

// QR formato C1-P125

let parts = decodedText.split("-P");

if(parts.length === 2){

let numero = parts[1];

document.getElementById("competitor_number").value = numero;

buscarPescador();

}

}

document
.getElementById("competitor_number")
.addEventListener("change", buscarPescador);


function buscarPescador(){

let numero = document.getElementById("competitor_number").value;

fetch(`/contest/${contestId}/fisher_lookup/?number=${numero}`)

.then(response => response.json())

.then(data => {

if(data.error){

document.getElementById("fisher_card").style.display="none";
return;

}

document.getElementById("fisher_name").innerText =
"Pescador #" + data.number + " - " + data.name;

document.getElementById("fisher_club").innerText =
data.club;

if(data.photo){
document.getElementById("fisher_photo").src = data.photo;
}

document.getElementById("fisher_card").style.display="block";

});

}

</script>

<script>

function hayInternet(){
    return navigator.onLine;
}

</script>

<script>

document.querySelector("form").addEventListener("submit", function(e){

    if(!navigator.onLine){

        e.preventDefault();

        guardarOffline();

        alert("📡 Sin internet. Captura guardada offline.");

    }

});

</script>

<script>

function guardarOffline(){

let number = document.getElementById("competitor_number").value;
let species = document.getElementById("species").value;
let length = document.getElementById("length_cm").value;

let capturas = JSON.parse(localStorage.getItem("capturas_pendientes") || "[]");

capturas.push({
    number:number,
    species:species,
    length_cm:length,
    date:new Date().toISOString()
});

localStorage.setItem(
    "capturas_pendientes",
    JSON.stringify(capturas)
);

}

</script>

<script>

window.addEventListener("online", sincronizarCapturas);

function sincronizarCapturas(){

let capturas = JSON.parse(localStorage.getItem("capturas_pendientes") || "[]");

if(capturas.length === 0){
    return;
}

capturas.forEach(c => {

fetch("/api/capture_sync/",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify(c)
});

});

localStorage.removeItem("capturas_pendientes");

alert("✔ Capturas sincronizadas");

}

</script>

<script>

if ("serviceWorker" in navigator) {

navigator.serviceWorker
.register("/static/sw.js")
.then(function(){

console.log("Service Worker registrado");

});

}

</script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

navigator.serviceWorker.ready.then(function(reg){

reg.pushManager.subscribe({

userVisibleOnly:true,

applicationServerKey:"{{ VAPID_PUBLIC_KEY }}"

}).then(function(sub){

fetch("/save_subscription/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(sub)

});

});

});

</script>

</body>
</html>
